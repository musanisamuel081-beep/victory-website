<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

header {
    background: #0d1b5e;
    color: white;
    text-align: center;
    padding: 15px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    padding: 10px;
}

.gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
<h1>Church Gallery</h1>
<a href="index.html" style="color:white;">Home</a>
</header>

<div class="gallery">
<img src="g1.jpg">
<img src="g2.jpg">
<img src="g3.jpg">
<img src="g4.jpg">
<img src="g5.jpg">
</div>

</body>
</html>
